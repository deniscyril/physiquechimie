* Un café initialement à $T_0 = 85\ °\text{C}$ refroidit dans une pièce à $T_e = 20\ °\text{C}$ selon $T(t) = T_e + (T_0 - T_e)\,e^{-t/\tau}$ avec $\tau = 10\ \text{min}$. Quelle est la température du café après 20 minutes ?

+ $29\ °\text{C}$
- $44\ °\text{C}$
- $53\ °\text{C}$
- $9\ °\text{C}$

# ── RADIOACTIVITÉ ─────────────────────────────────────────────────────────────

* L'expression de la loi de décroissance radioactive qui donne le nombre de noyaux radioactifs à l'instant $t$ est :

+ $N(t) = N_0 \times e^{-\lambda t}$
- $N(t) = N_0 \times e^{+\lambda t}$
- $N(t) = N_0 \times (1 - \lambda t)$
- $N(t) = \dfrac{N_0}{1 + \lambda t}$

* La demi-vie $t_{1/2}$ d'un noyau radioactif est définie comme :

+ La durée au bout de laquelle la moitié des noyaux radioactifs d'un échantillon se sont désintégrés
- La durée au bout de laquelle tous les noyaux se sont désintégrés
- La durée au bout de laquelle l'activité est nulle
- La durée au bout de laquelle le nombre de noyaux vaut $N_0 / e$

* On considère la transformation nucléaire : $^{238}_{92}\text{U} \longrightarrow ^{234}_{90}\text{Th} + X$. En appliquant les lois de conservation du nombre de charge et du nombre de masse, la particule $X$ est :

+ $^4_2\text{He}$ (radioactivité $\alpha$)
- $^0_{-1}e$ (radioactivité $\beta^-$)
- $^0_{+1}e$ (radioactivité $\beta^+$)
- $^1_0n$ (neutron)

<script type="application/x-qcm" id="raw-thermodynamique">
#  QCM Thermodynamique — Terminale Spécialité Physique-Chimie
#  Sources : 16_thermodynamique_1.tex et 16_thermodynamique_2.tex
#  Répartition : 12 connaissances pures / 4 raisonnement simple / 4 démarche complexe

#  ── CONNAISSANCES PURES ──────────────────────────────────────────────────────

* L'équation d'état d'un gaz parfait est :
+ $PV = nRT$
- $PV = mRT$
- $P = \rho RT$
- $PV = nRT^2$

* Dans l'équation d'état du gaz parfait $PV = nRT$, la température $T$ doit être exprimée en :
+ Kelvin (K)
- Degrés Celsius (°C)
- Kelvin par mole (K·mol$^{-1}$)
- Degrés Fahrenheit (°F)

* L'énergie interne $U$ d'un système macroscopique est :
+ La somme des énergies cinétiques et potentielles microscopiques de toutes les entités qui le constituent
- La somme de l'énergie cinétique macroscopique et de l'énergie potentielle de pesanteur
- L'énergie échangée avec l'extérieur lors d'une transformation
- Le produit de la capacité thermique par la température du système

* Le premier principe de la thermodynamique, pour un système immobile à l'échelle macroscopique, s'écrit :
+ $\Delta U = W + Q$
- $\Delta U = W - Q$
- $U = W + Q$
- $\Delta U = W \times Q$

* D'après la convention thermodynamique, le travail $W$ et le transfert thermique $Q$ sont comptés positivement quand :
+ L'énergie est reçue par le système depuis le milieu extérieur
- L'énergie est cédée par le système au milieu extérieur
- La température du système augmente
- La pression du système augmente

* Pour un système incompressible (liquide ou solide), le premier principe se réduit à $\Delta U = Q$ car :
+ Le travail $W$ des forces de pression est nul, le volume étant constant
- Le transfert thermique $Q$ est toujours nul pour ces systèmes
- L'énergie interne d'un système incompressible est constante
- La pression exercée sur le système est nulle

** Parmi les propositions suivantes, lesquelles désignent un mode de transfert thermique ?
+ La conduction
+ La convection
+ Le rayonnement
- Le travail des forces de pression
- La compression adiabatique

* Le flux thermique $\Phi$ s'exprime dans l'unité :
+ Watt (W)
- Joule (J)
- Joule par kelvin (J·K$^{-1}$)
- Pascal (Pa)

* L'albédo terrestre $A = 0{,}34$ signifie que :
+ 34 \% de la puissance solaire incidente est réfléchie par le système Terre-Atmosphère
- 34 \% de la puissance solaire incidente est absorbée par la surface terrestre
- La Terre réémet 34 \% de son rayonnement infrarouge directement vers l'espace
- L'atmosphère absorbe 34 \% du rayonnement solaire incident

* La résistance thermique $R_{th}$ d'une paroi plane d'épaisseur $e$, de surface $S$ et de conductivité thermique $\lambda$ est donnée par :
+ $R_{th} = \dfrac{e}{\lambda S}$
- $R_{th} = \lambda S e$
- $R_{th} = \dfrac{\lambda}{eS}$
- $R_{th} = \dfrac{eS}{\lambda}$

* Dans la loi de refroidissement $T(t) = T_e + (T_0 - T_e)\,e^{-t/\tau}$, le temps caractéristique $\tau$ vaut :
+ $\tau = \dfrac{C}{hS}$
- $\tau = hSC$
- $\tau = \dfrac{hS}{C}$
- $\tau = \dfrac{C}{h}$

#  ── RAISONNEMENT SIMPLE / APPLICATION DIRECTE ───────────────────────────────

* On chauffe 200 g d'eau ($c_\text{eau} = 4180$ J·kg$^{-1}$·K$^{-1}$) de 20 °C à 70 °C dans un récipient isolé. Quel est le transfert thermique reçu par l'eau ?
+ $41\,800$ J
- $4\,180$ J
- $8\,360$ J
- $209\,000$ J

* Une fenêtre en verre ($\lambda = 1{,}0$ W·m$^{-1}$·K$^{-1}$) a une épaisseur de 4 mm et une surface de 2{,}0 m$^2$. Sa résistance thermique vaut :
+ $2{,}0 \times 10^{-3}$ K·W$^{-1}$
- $5{,}0 \times 10^{2}$ K·W$^{-1}$
- $8{,}0 \times 10^{-3}$ K·W$^{-1}$
- $2{,}5 \times 10^{-1}$ K·W$^{-1}$

* Un objet à $T = 60$ °C est immergé dans un fluide à $T_e = 20$ °C. Le flux convectif vaut $\Phi = h \cdot S \cdot (T_e - T)$. Ce flux est :
+ Négatif : $T_e < T$, donc l'objet cède de l'énergie au fluide
- Positif : l'objet est plus chaud, il reçoit donc de l'énergie du fluide
- Nul : il faut attendre l'équilibre thermique avant tout transfert
- Positif : la valeur absolue de l'écart de température est grande

** Quelles affirmations concernant la résistance thermique $R_{th} = e/(\lambda S)$ sont correctes ?
+ Plus l'épaisseur $e$ de la paroi est grande, plus $R_{th}$ est grande et plus la paroi est isolante
+ Plus la surface $S$ de la paroi est grande, plus $R_{th}$ est petite
- Plus la conductivité thermique $\lambda$ est grande, plus la paroi est isolante
- Augmenter la surface d'une paroi augmente sa résistance thermique

#  ── DÉMARCHE COMPLEXE ────────────────────────────────────────────────────────

* En l'absence d'atmosphère, la Terre est à l'équilibre thermique : la puissance surfacique absorbée égale la puissance surfacique émise, soit $(1-A)\,P_S = \sigma T_0^4$. On donne : $P_S = 340$ W·m$^{-2}$, $A = 0{,}34$, $\sigma = 5{,}67 \times 10^{-8}$ W·m$^{-2}$·K$^{-4}$. La température $T_0$ de la Terre sans atmosphère est environ :
+ $255$ K $\approx -18$ °C
- $288$ K $\approx 15$ °C
- $340$ K $\approx 67$ °C
- $214$ K $\approx -59$ °C

* Un café initialement à $T_0 = 85$ °C refroidit dans une pièce à $T_e = 20$ °C selon $T(t) = T_e + (T_0 - T_e)\,e^{-t/\tau}$ avec $\tau = 10$ min. Quelle est la température du café après 20 minutes ?
+ $29$ °C
- $44$ °C
- $53$ °C
- $9$ °C

** On plonge un bloc d'acier de 200 g à 80 °C dans 500 mL d'eau à 15 °C dans un récipient parfaitement isolant. On donne $c_\text{acier} = 500$ J·kg$^{-1}$·K$^{-1}$ et $c_\text{eau} = 4180$ J·kg$^{-1}$·K$^{-1}$. Quelles affirmations sont correctes ?
+ L'acier cède de l'énergie à l'eau : son transfert thermique est négatif
+ La température finale vérifie $m_\text{acier}\,c_\text{acier}\,(T_f - 80) + m_\text{eau}\,c_\text{eau}\,(T_f - 15) = 0$
+ La température finale est environ 18 °C
- La température finale est environ 19 °C
- La température finale est la moyenne des deux températures initiales, soit 47,5 °C
- L'eau cède de l'énergie à l'acier car sa masse est plus grande

- Le pH augmente proportionnellement au volume versé

<script>
'use strict';

const CHAPTER_NAMES = {
  'RC': 'Circuit RC',
  'Thermo_electrolyse': 'Thermodynamique & Électrolyse',
  'acide_base': 'Acides et bases',
  'cinematique': 'Cinématique',
  'cinetique': 'Cinétique chimique',
  'dynamique': 'Dynamique',
  'forces_acide_base': 'Équilibres acide-base',
  'lunette_astro': 'Lunette astronomique',
  'meca_fluides': 'Mécanique des fluides',
  'methodes_physiques': 'Méthodes physiques',
  'mvt_champ': 'Mouvement dans un champ',
  'ondes': 'Ondes',
  'radioactivite': 'Radioactivité',
  'remix_meca_flu_thermo_radio': 'Remix Meca Flu Thermo Radio',
  'thermodynamique': 'Thermodynamique',
  'titrage': 'Titrages',
};

function parseAMC(text) {
  const questions = [];
  let cur = null;
  for (const rawLine of text.split('\n')) {
    const line = rawLine.trim();
    if (!line || line.startsWith('#')) continue;
    if (/^\*\*($|\s)/.test(line)) {
      if (cur) questions.push(cur);
      cur = { type: 'multiple', text: line.replace(/^\*\*\s*/, ''), answers: [] };
    } else if (/^\*($|\s)/.test(line)) {
      if (cur) questions.push(cur);
      cur = { type: 'single', text: line.replace(/^\*\s*/, ''), answers: [] };
    } else if (/^\+/.test(line) && cur) {
      const t = line.replace(/^\+\s*/, '');
      if (t && !t.includes('\\includegraphics')) cur.answers.push({ text: t, correct: true });
    } else if (/^[-_]/.test(line) && cur) {
      const t = line.replace(/^[-_]\s*/, '');
      if (t && !t.includes('\\includegraphics')) cur.answers.push({ text: t, correct: false });
    } else if (cur) {
      if (line.includes('\\includegraphics')) cur.text += '\n[📊 Figure non disponible]';
      else cur.text += '\n' + line;
    }
  }
  if (cur) questions.push(cur);
  return questions.filter(q => q.answers.length >= 2 && q.answers.some(a => a.correct));
}

const CHAPTERS = {};
for (const id of Object.keys(CHAPTER_NAMES)) {
  const el = document.getElementById('raw-' + id);
  if (el) {
    const qs = parseAMC(el.textContent);
    if (qs.length > 0) CHAPTERS[id] = qs;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderMath(el) {
  if (typeof renderMathInElement === 'function') {
    renderMathInElement(el, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$',  right: '$',  display: false },
        { left: '\\(', right: '\\)', display: false },
        { left: '\\[', right: '\\]', display: true },
      ],
      throwOnError: false,
    });
  }
}

const TOTAL = 10;
const S = { mode: null, selected: [], quiz: [], cur: 0, userAnswers: [] };

function buildQuiz() {
  if (S.mode === 'random') {
    const pool = [];
    for (const [id, qs] of Object.entries(CHAPTERS))
      qs.forEach(q => pool.push({ ...q, chapter: CHAPTER_NAMES[id] }));
    return shuffle(pool).slice(0, Math.min(TOTAL, pool.length));
  }
  if (S.mode === 'single') {
    const id = S.selected[0];
    return shuffle(CHAPTERS[id] || [])
      .slice(0, Math.min(TOTAL, (CHAPTERS[id] || []).length))
      .map(q => ({ ...q, chapter: CHAPTER_NAMES[id] }));
  }
  const pools = S.selected
    .filter(id => CHAPTERS[id]?.length > 0)
    .map(id => ({ id, qs: shuffle([...CHAPTERS[id]]) }));
  if (!pools.length) return [];
  const n = pools.length;
  const counts = pools.map(() => Math.floor(TOTAL / n));
  let rem = TOTAL % n;
  for (let i = 0; i < pools.length && rem > 0; i++) { counts[i]++; rem--; }
  for (let i = 0; i < pools.length; i++) counts[i] = Math.min(counts[i], pools[i].qs.length);
  let taken = counts.reduce((s, c) => s + c, 0);
  for (let i = 0; i < pools.length && taken < TOTAL; i++) {
    const add = Math.min(pools[i].qs.length - counts[i], TOTAL - taken);
    counts[i] += add; taken += add;
  }
  const result = [];
  for (let i = 0; i < pools.length; i++)
    pools[i].qs.slice(0, counts[i]).forEach(q => result.push({ ...q, chapter: CHAPTER_NAMES[pools[i].id] }));
  return shuffle(result);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById(id);
  el.classList.remove('hidden');
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
}

function selectMode(mode) {
  S.mode = mode; S.selected = [];
  if (mode === 'random') { startQuiz(); return; }
  document.getElementById('chapter-screen-title').textContent =
    mode === 'single' ? 'Choisissez un chapitre' : 'Choisissez les chapitres';
  document.getElementById('selection-info').textContent = '';
  document.getElementById('btn-start').disabled = true;
  buildChapterGrid(mode);
  showScreen('screen-chapters');
}

function buildChapterGrid(mode) {
  const grid = document.getElementById('chapter-grid');
  grid.innerHTML = '';
  for (const [id, name] of Object.entries(CHAPTER_NAMES)) {
    const qs = CHAPTERS[id];
    if (!qs) continue;
    const item = document.createElement('div');
    item.className = 'ch-item'; item.dataset.id = id;
    item.innerHTML = `<div class="ch-name">${name}</div><div class="ch-count">${qs.length} question${qs.length > 1 ? 's' : ''}</div>`;
    item.addEventListener('click', () => toggleChapter(id, mode, item));
    grid.appendChild(item);
  }
}

function toggleChapter(id, mode, el) {
  if (mode === 'single') {
    document.querySelectorAll('.ch-item').forEach(i => i.classList.remove('selected'));
    el.classList.add('selected'); S.selected = [id];
    const n = Math.min(CHAPTERS[id].length, TOTAL);
    document.getElementById('selection-info').textContent = `${n} question${n > 1 ? 's' : ''} dans ce chapitre`;
    document.getElementById('btn-start').disabled = false;
  } else {
    const idx = S.selected.indexOf(id);
    if (idx >= 0) { S.selected.splice(idx, 1); el.classList.remove('selected'); }
    else           { S.selected.push(id);       el.classList.add('selected'); }
    const nb = S.selected.length;
    document.getElementById('selection-info').textContent =
      nb ? `${nb} chapitre${nb > 1 ? 's' : ''} sélectionné${nb > 1 ? 's' : ''}` : '';
    document.getElementById('btn-start').disabled = nb === 0;
  }
}

function goBack() { showScreen('screen-mode'); }

function startQuiz() {
  S.quiz = buildQuiz();
  if (!S.quiz.length) { alert('Aucune question disponible.'); return; }
  S.cur = 0; S.userAnswers = S.quiz.map(() => new Set());
  document.getElementById('q-tot').textContent = S.quiz.length;
  showQuestion(0); showScreen('screen-quiz');
}

function showQuestion(idx) {
  const q = S.quiz[idx], total = S.quiz.length;
  document.getElementById('q-num').textContent = idx + 1;
  document.getElementById('progress-bar-fill').style.width = (idx / total * 100) + '%';
  document.getElementById('q-chapter-tag').textContent = q.chapter || '';
  const shuffled = shuffle(q.answers.map((a, i) => ({ ...a, oi: i })));
  const isMulti = q.type === 'multiple';
  const badge = isMulti
    ? '<span class="q-type-badge badge-multi">Réponses multiples</span>'
    : '<span class="q-type-badge badge-single">Réponse unique</span>';
  const answersHTML = shuffled.map(a => `
    <label class="ans-item" data-oi="${a.oi}">
      <input type="${isMulti ? 'checkbox' : 'radio'}" name="${isMulti ? 'q'+idx+'a'+a.oi : 'q'+idx}" value="${a.oi}" onchange="handleAnswer(${idx},${a.oi},this)">
      <span class="ans-text">${a.text}</span>
    </label>`).join('');
  const card = document.getElementById('question-card');
  card.innerHTML = `${badge}<div class="q-text">${q.text.trim()}</div><div class="answers-list">${answersHTML}</div>`;
  document.getElementById('btn-next').textContent = idx === total - 1 ? 'Voir les résultats →' : 'Question suivante →';
  renderMath(card);
}

function handleAnswer(qIdx, oi, input) {
  const q = S.quiz[qIdx], sel = S.userAnswers[qIdx];
  if (q.type === 'single') {
    sel.clear(); sel.add(oi);
    document.querySelectorAll('#question-card .ans-item').forEach(el => el.classList.remove('selected'));
    input.closest('.ans-item').classList.add('selected');
  } else {
    if (input.checked) { sel.add(oi); input.closest('.ans-item').classList.add('selected'); }
    else               { sel.delete(oi); input.closest('.ans-item').classList.remove('selected'); }
  }
}

function nextQuestion() {
  S.cur++;
  if (S.cur >= S.quiz.length) showResults(); else showQuestion(S.cur);
}

function isCorrect(q, sel) {
  const correct = new Set(q.answers.map((a, i) => a.correct ? i : -1).filter(i => i >= 0));
  return [...correct].every(i => sel.has(i)) && [...sel].every(i => correct.has(i));
}

function showResults() {
  const total = S.quiz.length;
  const scored = S.quiz.map((q, i) => isCorrect(q, S.userAnswers[i]));
  const score = scored.filter(Boolean).length;
  const pct = Math.round(score / total * 100);
  let emoji = '😅', color = '#dc2626';
  if (pct >= 90) { emoji = '🏆'; color = '#16a34a'; }
  else if (pct >= 70) { emoji = '😊'; color = '#16a34a'; }
  else if (pct >= 50) { emoji = '🤔'; color = '#d97706'; }
  document.getElementById('score-block').innerHTML = `
    <div class="score-card">
      <div class="score-emoji">${emoji}</div>
      <div class="score-num" style="color:${color}">${score}<span class="score-denom">/${total}</span></div>
      <div class="score-pct">${pct}% de réussite</div>
    </div>`;
  const list = document.getElementById('results-list');
  list.innerHTML = '';
  S.quiz.forEach((q, i) => {
    const ok = scored[i], sel = S.userAnswers[i];
    const div = document.createElement('div');
    div.className = `res-item ${ok ? 'res-ok' : 'res-fail'}`;
    const answersHTML = q.answers.map((a, ai) => {
      const was = sel.has(ai);
      if (a.correct && was)  return `<div class="res-ans ra-ok"><span class="ra-icon">✓</span><span>${a.text}</span></div>`;
      if (!a.correct && was) return `<div class="res-ans ra-err"><span class="ra-icon">✗</span><span>${a.text}</span></div>`;
      if (a.correct && !was) return `<div class="res-ans ra-miss"><span class="ra-icon">○</span><span>${a.text} <em>(manquée)</em></span></div>`;
      return '';
    }).join('');
    div.innerHTML = `
      <div class="res-chapter">${q.chapter || ''}</div>
      <div class="res-top">
        <div class="res-q-text">${q.text.trim()}</div>
        <div class="res-icon">${ok ? '✅' : '❌'}</div>
      </div>
      <div class="res-answers">${answersHTML}</div>`;
    list.appendChild(div); renderMath(div);
  });
  showScreen('screen-results');
}

function goToMenu() { S.mode = null; S.selected = []; showScreen('screen-mode'); }

// Init
(function () {
  let total = 0;
  for (const qs of Object.values(CHAPTERS)) total += qs.length;
  document.getElementById('bank-info').textContent =
    `${total} questions disponibles · ${Object.keys(CHAPTERS).length} chapitres`;
})();
</script>
</body>
